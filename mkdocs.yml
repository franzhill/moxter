site_name: Moxter
site_url: https://franzhill.github.io/moxter/

theme:
  name: material
  palette:
    primary: grey   # https://squidfunk.github.io/mkdocs-material/setup/changing-the-colors/
    accent: blue  # This handles all buttons, links, and highlights automatically
    scheme: slate  # slate = dark mode
  features:
    - navigation.tabs          # Top-level menu instead of just a sidebar
    - navigation.tabs.sticky   # Menu stays visible when you scroll
    - navigation.sections      # Groups the sidebar into clear blocks
    - navigation.expand        # Keeps the sidebar open so users see the depth
    - navigation.top           # Adds a "Back to Top" button
    - toc.follow               # Highlighting the sidebar as you scroll
# doesnt work
#    - toc.integrate            # Moves the ToC to the left sidebar    

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - enumerate-headings:
      toc_depth: 3     # Numbers will show up in the sidebar Table of Contents too
      strict: false    # Avoid errors if a page skips a heading level


markdown_extensions:
  - admonition
  - pymdownx.tabbed:    # Enables tabs
      alternate_style: true 
  - pymdownx.superfences:  # Required for code blocks inside tabs
        custom_fences:
          - name: mermaid
            class: mermaid
            format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tasklist:  # Display a list as checkboxes with [x]
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: moxter/index.md
  - Moxter:
    - Introduction: moxter/index.md  # provide a "broader view" of the documentation is through the sidebar. This allows users to see all chapters from any page they are on.
    - State of unit testing: moxter/state_of_auto_testing.md
    - Philosophy: moxter/philosophy.md
    - First Simple Example: moxter/first_simple_example.md
    - Core Syntax: moxter/fixtures.md



    - Inheritance (basedOn): moxter/fixtures.md#basedon
    - Variables: moxter/variables.md
    - Features:
       - Multipart: moxter/multipart.md
       - Lax Modes: moxter/index.md#lax-mode
    - Cookbook: moxter/examples.md

