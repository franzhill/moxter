site_name: Moxter
site_url: https://franzhill.github.io/moxter/

theme:
  name: material
  logo: assets/logo.png
  palette:
    primary: grey   # https://squidfunk.github.io/mkdocs-material/setup/changing-the-colors/
    accent: blue  # This handles all buttons, links, and highlights automatically
    scheme: slate  # slate = dark mode
  features:
    - navigation.tabs          # Top-level menu instead of just a sidebar
    - navigation.tabs.sticky   # Menu stays visible when you scroll
    - navigation.sections      # Groups the sidebar into clear blocks
    - navigation.expand        # Keeps the sidebar open so users see the depth
    - navigation.top           # Adds a "Back to Top" button
    - toc.follow               # Highlighting the sidebar as you scroll
# doesnt work
#    - toc.integrate            # Moves the ToC to the left sidebar    
    - content.code.copy        # Add a copy buton on code snippets
    - content.tabs.link        # Keeps tabs in sync across the page
    - tables.sortable          # Allows users to sort

extra_css:
  - stylesheets/extra.css

plugins:
  - search
#  - enumerate-headings:
#      toc_depth: 3     # Numbers will show up in the sidebar Table of Contents too
#      strict: false    # Avoid errors if a page skips a heading level


markdown_extensions:
  - admonition
  - attr_list   # add a css class to a markdown element with the syntax: {: .my_class}
  - md_in_html  #
  - pymdownx.tabbed:    # Enables tabs
      alternate_style: true 
  - pymdownx.highlight:
      anchor_linenums: true       # Enables clickable anchors for line numbers 
                                  # so you can link to specific lines
      line_spans: __span          # Wraps each line of code in a <span> tag 
                                  # (helps with CSS and accessibility)
      pygments_lang_class: true   # Adds a CSS class to the code block 
                                  # based on the language (e.g., .language-xml)
  - pymdownx.inlinehilite         # Allows you to use `backticks` for highlighted 
                                  # code inside a sentence (inline)
  - pymdownx.snippets             # Lets you insert content from other files into your 
                                  # Markdown using the --8<-- syntax
  - pymdownx.superfences:  # Enhances standard code blocks to allow for nesting 
                           # and advanced content like diagrams
                           # Required for code blocks inside tabs
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tasklist:  # Display a list as checkboxes with [x]
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg



