  # ==================================================================
  #
  # This file being at the root of the hierarchy exposes moxtures available 
  # to all JUnit test classes and all moxtures files (via basedOn/extends)
  #
  # So the idea is to keep them versatile, generic, and keep the 
  # complex assertions out of them.
  # ==================================================================

moxtures:

  - name: BeforeAll
    method: POST
    endpoint: /api/species
    save:
      speciesId: "$.id"
    expect:
      status: 201       # 2xx    also accepted



  - name: create_owner
    method: POST
    endpoint: /owners
    vars:
      in.name     : "Tintin"
    body: |
      { "name": {{in.name}}
      }
    save:
      ownerId: "$.id"


  - name: create_pet_for_owner
    endpoint: "/api/pets"
    method: POST
    vars:
      in.name     : "Snowy"         # the 'in.' prefix is just a convention. It could have been 'in_name' too.
      in.sex      :  "MALE"         # Here we define a default value.
      in.birthDate: "2020-01-01"    # Here too.
      in.species  : "Dog"           # Default values can be overridden at call time.
      in.ownerId  : "{{ownerId}}"   # Here we are using the global 'ownerId' as the default.
                                    # This lets us nicely chain after calling 'create_owner'.
                                    # OR as always, override at call time.
    body: |
      {
        "name": "{{in.name}}",
        "sex": "{{in.sex}}",
        "birthDate": "{{in.birthDate}}",
        "species": {
          "name": "{{in.species}}"
        },
        "owner": {
          "id": {{in.ownerId}}
        }
      }
    save:
      # Variables are global and can be reused in this fixture file through
      # the following syntax:
      #    {{name_of_my_variable}}
      petId: "$.id"
      petName: "$.name"
      petOwnerId: "$.owner.id"
    expect:
      status: 201




